<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — LegalKeys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{primary:'#165DFF',secondary:'#36CFC9',dark:'#1D2129',light:'#F2F3F5',danger:'#F53F3F',success:'#00B42A',warning:'#FF7D00'}}}}</script>
    <style>.form-focus:focus{border-color:#165DFF;outline:none;box-shadow:0 0 0 2px rgba(22,93,255,0.1);}</style>
</head>
<body class="bg-gray-50 font-sans flex flex-col min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <a href="index.html"><img src="logo.png?v=1" alt="LegalKeys" style="height:40px;width:auto;"></a>
            <nav class="hidden md:flex gap-6">
                <a href="index.html" class="font-medium hover:text-primary">Home</a>
                <a href="index.html#browse" class="font-medium hover:text-primary">Browse</a>
                <a href="sell.html" class="font-medium hover:text-primary">Sell Legally</a>
                <a href="index.html#compliance" class="font-medium hover:text-primary">Why Us</a>
                <a href="about.html" class="font-medium hover:text-primary">About</a>
            </nav>
            <div class="flex items-center gap-2">
                <div class="hidden md:flex gap-2" id="authButtons">
                    <button onclick="openModal('loginModal')" class="px-4 py-2 rounded-lg hover:bg-gray-100">Login</button>
                    <button onclick="openModal('registerModal')" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90">Register</button>
                </div>
                <button class="md:hidden text-dark text-2xl ml-2" onclick="toggleMobileMenu()" aria-label="Menu">
                    <i class="fa fa-bars"></i>
                </button>
            </div>
        </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100 px-4 py-3 space-y-2">
        <a href="index.html" class="block py-2 font-medium hover:text-primary">Home</a>
        <a href="index.html#browse" class="block py-2 font-medium hover:text-primary">Browse</a>
        <a href="sell.html" class="block py-2 font-medium hover:text-primary">Sell Legally</a>
        <a href="index.html#compliance" class="block py-2 font-medium hover:text-primary">Why Us</a>
        <a href="about.html" class="block py-2 font-medium hover:text-primary">About</a>
        <div class="flex gap-2 pt-2 border-t border-gray-100">
            <button onclick="openModal('loginModal');toggleMobileMenu()" class="flex-1 px-4 py-2 border rounded-lg hover:bg-gray-100 text-sm">Login</button>
            <button onclick="openModal('registerModal');toggleMobileMenu()" class="flex-1 bg-primary text-white px-4 py-2 rounded-lg text-sm hover:bg-primary/90">Register</button>
        </div>
    </div>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-xl w-full max-w-md p-6 m-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">Login</h3>
            <button onclick="closeModal('loginModal')" class="text-gray-500 text-xl">&times;</button>
        </div>
        <form action="/api/login" method="POST">
            <div class="mb-4"><label class="block text-sm font-medium mb-1">Email</label><input type="email" name="email" class="w-full p-2 border rounded form-focus" required></div>
            <div class="mb-4"><label class="block text-sm font-medium mb-1">Password</label><input type="password" name="password" class="w-full p-2 border rounded form-focus" required></div>
            <button type="submit" class="w-full bg-primary text-white p-2 rounded hover:bg-primary/90">Login</button>
        </form>
    </div>
</div>

<!-- REGISTER MODAL -->
<div id="registerModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center overflow-y-auto">
    <div class="bg-white rounded-xl w-full max-w-md p-6 m-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">Register Account</h3>
            <button onclick="closeModal('registerModal')" class="text-gray-500 text-xl">&times;</button>
        </div>
        <form action="/api/register" method="POST">
            <div class="mb-3"><label class="block text-sm font-medium mb-1">Full Name</label><input type="text" name="name" class="w-full p-2 border rounded form-focus" required></div>
            <div class="mb-3"><label class="block text-sm font-medium mb-1">Email</label><input type="email" name="email" class="w-full p-2 border rounded form-focus" required></div>
            <div class="mb-3"><label class="block text-sm font-medium mb-1">Password</label><input type="password" name="password" class="w-full p-2 border rounded form-focus" required></div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Account Type</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="type" value="buyer" checked onchange="toggleSellerFields()"> Buyer</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="type" value="seller" onchange="toggleSellerFields()"> Seller (Business)</label>
                </div>
            </div>
            <div id="sellerFields" class="border-t pt-4 mb-4 hidden">
                <h4 class="font-semibold text-primary mb-3">Business Details (Required)</h4>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">Company / Trading Name</label><input type="text" name="company_name" class="w-full p-2 border rounded form-focus"></div>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">Company Reg Number (if limited company)</label><input type="text" name="company_number" class="w-full p-2 border rounded form-focus"></div>
                <div class="mb-3"><label class="block text-sm font-medium mb-1">VAT Number (if VAT registered)</label><input type="text" name="vat_number" class="w-full p-2 border rounded form-focus"></div>
            </div>
            <div class="mb-4">
                <label class="flex items-start gap-2 text-sm"><input type="checkbox" required class="mt-1"><span>I agree to the <a href="Legal/terms.html" class="text-primary hover:underline">Terms of Service</a> and <a href="Legal/privacy.html" class="text-primary hover:underline">Privacy Policy</a>.</span></label>
            </div>
            <button type="submit" class="w-full bg-primary text-white p-2 rounded hover:bg-primary/90">Create Account</button>
        </form>
    </div>
</div>

<main class="flex-1 flex items-center justify-center py-12">
    <div class="bg-white rounded-xl shadow p-10 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-2 text-gray-900">Order Confirmed!</h1>
        <p class="text-gray-600 mb-6">Thank you for your purchase. Your game key will be delivered to your email shortly.</p>
        <div id="keyBox" class="bg-gray-100 rounded-lg p-4 mb-6 hidden">
            <p class="text-xs text-gray-500 mb-1">Your Game Key</p>
            <p id="keyCode" class="font-mono font-bold text-lg tracking-widest text-primary"></p>
        </div>
        <a href="index.html" class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 inline-block">Back to Store</a>
    </div>
</main>
<script>
function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
function toggleSellerFields() { const d=document.getElementById('sellerFields'); d.classList.toggle('hidden', event.target.value!=='seller'); }
function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('hidden'); }

const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');
if (orderId) {
    const p = document.createElement('p');
    p.className = 'text-xs text-gray-400 mt-4';
    p.textContent = 'Order reference: #' + orderId;
    document.querySelector('main .bg-white').appendChild(p);
}
</script>
</body>
</html>
